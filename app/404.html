<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 — Сторінку не знайдено</title>
    <meta name="robots" content="noindex">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon.png">
    <style>
        :root { --bg: #fff; --text: #1a1a1a; --surface: #f5f5f5; --border: #e0e0e0; --accent: #000; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000; --text: #f5f5f5; --surface: #111; --border: #222; --accent: #fff; }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .container { max-width: 400px; }
        h1 { font-size: 6rem; font-weight: 800; letter-spacing: -2px; opacity: 0.15; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: var(--text); opacity: 0.6; margin-bottom: 2rem; line-height: 1.5; }
        a {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--accent); color: var(--bg);
            text-decoration: none; padding: 0.9rem 2rem; border-radius: 16px;
            font-weight: 600; font-size: 1rem;
            transition: transform 0.2s;
        }
        a:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Сторінку не знайдено</h2>
        <p>Такої сторінки не існує або вона була переміщена.</p>
        <a href="/">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            На головну
        </a>
    </div>
</body>
</html>
